AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Frank Art Generator - Daily AI artwork generation at 9 PM UTC

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12

Resources:
  FrankArtGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: frank-art-generator
      Handler: frank_art_generator.lambda_handler
      CodeUri: marketplace
      Description: Generates 4 AI artworks daily using SDXL
      Architectures:
        - x86_64
      Environment:
        Variables:
          S3_BUCKET: noisemakerpromobydoowopp
      Policies:
        - S3CrudPolicy:
            BucketName: noisemakerpromobydoowopp
        - DynamoDBCrudPolicy:
            TableName: noisemaker-frank-art
        - SSMParameterReadPolicy:
            ParameterName: noisemaker/*
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            Name: frank-art-daily-schedule
            Description: Trigger Frank Art generation daily at 9 PM UTC
            ScheduleExpression: cron(0 21 * * ? *)
            State: ENABLED

Outputs:
  FunctionArn:
    Description: Frank Art Generator Lambda ARN
    Value: !GetAtt FrankArtGeneratorFunction.Arn
  FunctionName:
    Description: Frank Art Generator Lambda Name
    Value: !Ref FrankArtGeneratorFunction