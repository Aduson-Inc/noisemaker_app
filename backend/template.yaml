AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Frank Art Generator - Daily AI artwork generation at 9 PM UTC

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12

Resources:
  FrankArtGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: frank-art-generator
      Handler: marketplace.frank_art_generator.lambda_handler
      CodeUri: .
      Description: Generates 4 AI artworks daily using SDXL
      Architectures:
        - x86_64
      Environment:
        Variables:
          S3_BUCKET: noisemakerpromobydoowopp
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:ListBucket
              Resource:
                - arn:aws:s3:::noisemakerpromobydoowopp
                - arn:aws:s3:::noisemakerpromobydoowopp/*
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Scan
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource:
                - arn:aws:dynamodb:us-east-2:*:table/noisemaker-frank-art
                - arn:aws:dynamodb:us-east-2:*:table/noisemaker-frank-art/*
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - arn:aws:ssm:us-east-2:*:parameter/noisemaker/*
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            Name: frank-art-daily-schedule
            Description: Trigger Frank Art generation daily at 9 PM UTC
            ScheduleExpression: cron(0 21 * * ? *)
            State: ENABLED

Outputs:
  FunctionArn:
    Description: Frank Art Generator Lambda ARN
    Value: !GetAtt FrankArtGeneratorFunction.Arn
  FunctionName:
    Description: Frank Art Generator Lambda Name
    Value: !Ref FrankArtGeneratorFunction
