name: Deploy Frank Art Generator (SAM)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/marketplace/**'
      - 'backend/template.yaml'
      - 'backend/requirements.txt'
      - '.github/workflows/deploy-lambda.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: SAM Build
        working-directory: backend
        run: sam build

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name frank-art-generator-stack \
            --region us-east-2 \
            --capabilities CAPABILITY_IAM \
            --s3-bucket noisemakerpromobydoowopp \
            --s3-prefix sam-deployments/frank-art-generator \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Deployment Summary
        run: |
          echo "=============================================="
          echo "SAM Deployment completed successfully!"
          echo "=============================================="
          echo "Stack: frank-art-generator-stack"
          echo "Region: us-east-2"
          echo "Function: frank-art-generator"
          echo "Trigger: EventBridge cron(0 21 * * ? *) - 9 PM UTC daily"
