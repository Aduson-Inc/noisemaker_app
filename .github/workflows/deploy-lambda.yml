name: Deploy Frank Art Generator to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-lambda.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t lambda_package/

      - name: Copy application code
        working-directory: backend
        run: |
          mkdir -p lambda_package/backend
          cp -r marketplace lambda_package/backend/
          cp -r auth lambda_package/backend/
          cp -r data lambda_package/backend/
          touch lambda_package/backend/__init__.py

      - name: Create deployment package
        working-directory: backend/lambda_package
        run: |
          zip -r ../frank_art_generator.zip . -x "*.pyc" -x "*__pycache__*" -x "*.dist-info/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy to Lambda
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name frank-art-generator \
            --zip-file fileb://frank_art_generator.zip \
            --region us-east-2

          aws lambda wait function-updated \
            --function-name frank-art-generator \
            --region us-east-2

      - name: Update Lambda handler
        run: |
          aws lambda update-function-configuration \
            --function-name frank-art-generator \
            --handler backend.marketplace.daily_album_art_generator.lambda_handler \
            --region us-east-2

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully!"
          echo "Lambda function: frank-art-generator"
          echo "Region: us-east-2"
          echo "Next run: Today at 9 PM UTC"
