name: Deploy Frank Art Generator

on:
  push:
    branches:
      - main
    paths:
      - 'backend/marketplace/frank_art_generator.py'
      - 'backend/template.yaml'
      - 'backend/requirements.txt'
      - '.github/workflows/deploy-frank-art.yml'

  workflow_dispatch:

concurrency:
  group: frank-art-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: SAM Build
        working-directory: backend
        run: sam build

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --stack-name frank-art-generator \
            --region us-east-2 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Verify Deployment
        run: |
          echo "Verifying Lambda function..."
          aws lambda get-function --function-name frank-art-generator --region us-east-2 --query 'Configuration.FunctionName'
          echo "Deployment successful!"
